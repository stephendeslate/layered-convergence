version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: fsd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fsd_dev
      POSTGRES_USER: fsd_user
      POSTGRES_PASSWORD: fsd_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fsd_user -d fsd_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fsd-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
