version: '3.8'

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fieldservice
      POSTGRES_PASSWORD: fieldservice
      POSTGRES_DB: field_service_dispatch_test
    ports:
      - '5433:5432'
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fieldservice -d field_service_dispatch_test']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-test-data:
