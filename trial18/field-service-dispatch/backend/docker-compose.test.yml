services:
  test-db:
    image: postgres:16-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: field_service_test
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
    volumes:
      - test-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U testuser -d field_service_test']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  test-db-data:
