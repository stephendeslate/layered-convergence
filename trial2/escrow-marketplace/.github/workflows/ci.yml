name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: marketplace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/marketplace_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret-minimum-32-chars
      JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret-32-chars
      STRIPE_SECRET_KEY: sk_test_fake_ci_key
      STRIPE_WEBHOOK_SECRET: whsec_test_fake_ci_secret
      STRIPE_PUBLISHABLE_KEY: pk_test_fake_ci_key
      CORS_ORIGINS: http://localhost:3001
      PLATFORM_FEE_PERCENT: 10
      DEFAULT_HOLD_PERIOD_DAYS: 14
      MIN_PLATFORM_FEE_CENTS: 50
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx turbo run db:generate

      - name: Push database schema
        run: cd apps/api && npx prisma db push --skip-generate

      - name: Lint
        run: npx turbo run lint

      - name: Run unit and integration tests
        run: npx turbo run test

      - name: Run E2E tests
        run: npx turbo run test:e2e

      - name: Build
        run: npx turbo run build

      - name: Security audit
        run: npm audit --audit-level=high || true
