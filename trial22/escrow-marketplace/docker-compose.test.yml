services:
  db-test:
    image: postgres:16
    environment:
      POSTGRES_DB: escrow_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d escrow_test"]
      interval: 5s
      timeout: 5s
      retries: 5
