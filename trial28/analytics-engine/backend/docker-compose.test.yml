version: "3.9"

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: analytics_test
      POSTGRES_PASSWORD: analytics_test_secret
      POSTGRES_DB: analytics_engine_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics_test -d analytics_engine_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    depends_on:
      postgres-test:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://analytics_test:analytics_test_secret@postgres-test:5432/analytics_engine_test?schema=public
      JWT_SECRET: test-jwt-secret
      CORS_ORIGIN: http://localhost:3000
      PORT: "4000"
    command: ["npm", "test"]
