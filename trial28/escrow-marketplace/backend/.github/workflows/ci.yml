name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npx prisma generate
        working-directory: backend
      - run: npm run lint
        working-directory: backend

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: escrow_test
          POSTGRES_PASSWORD: escrow_test_secret
          POSTGRES_DB: escrow_marketplace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U escrow_test -d escrow_marketplace_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://escrow_test:escrow_test_secret@localhost:5432/escrow_marketplace_test?schema=public
      JWT_SECRET: ci-test-jwt-secret
      CORS_ORIGIN: http://localhost:3000
      PORT: "4001"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npx prisma generate
        working-directory: backend
      - run: npx prisma migrate deploy
        working-directory: backend
      - run: npm test
        working-directory: backend

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npx prisma generate
        working-directory: backend
      - run: npm run build
        working-directory: backend

  migration-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: escrow_test
          POSTGRES_PASSWORD: escrow_test_secret
          POSTGRES_DB: escrow_marketplace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U escrow_test -d escrow_marketplace_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://escrow_test:escrow_test_secret@localhost:5432/escrow_marketplace_test?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npx prisma migrate deploy
        working-directory: backend
      - name: Check schema and migration alignment
        run: npx prisma migrate diff --from-migrations ./prisma/migrations --to-schema-datamodel ./prisma/schema.prisma --exit-code
        working-directory: backend
