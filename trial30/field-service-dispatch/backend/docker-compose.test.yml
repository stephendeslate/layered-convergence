version: "3.9"

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dispatch_test
      POSTGRES_PASSWORD: dispatch_test_secret
      POSTGRES_DB: field_service_dispatch_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dispatch_test -d field_service_dispatch_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    depends_on:
      postgres-test:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dispatch_test:dispatch_test_secret@postgres-test:5432/field_service_dispatch_test?schema=public
      JWT_SECRET: test-jwt-secret
      CORS_ORIGIN: http://localhost:3000
      PORT: "4000"
    command: ["pnpm", "test"]
