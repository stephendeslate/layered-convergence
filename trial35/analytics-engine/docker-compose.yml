# Docker Compose with PostgreSQL
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: analytics_engine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ae_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ae_pgdata:
