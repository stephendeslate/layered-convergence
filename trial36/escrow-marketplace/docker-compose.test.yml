version: "3.9"

services:
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: escrow_marketplace_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 5

  api-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db-test:5432/escrow_marketplace_test
      DIRECT_URL: postgresql://postgres:postgres@db-test:5432/escrow_marketplace_test
      JWT_SECRET: test-jwt-secret-minimum-32-characters
      JWT_EXPIRES_IN: 1h
      API_PORT: "3001"
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: test
    depends_on:
      db-test:
        condition: service_healthy
    command: pnpm test:ci
