services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: analytics_test
      POSTGRES_PASSWORD: analytics_test
      POSTGRES_DB: analytics_engine_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics_test -d analytics_engine_test"]
      interval: 5s
      timeout: 3s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data
