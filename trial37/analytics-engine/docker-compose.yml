services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      POSTGRES_DB: analytics_engine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d analytics_engine"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://analytics:analytics@postgres:5432/analytics_engine?schema=public"
      JWT_SECRET: "${JWT_SECRET}"
      CORS_ORIGIN: "http://localhost:3000"
      PORT: "3001"
      NODE_ENV: "production"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
