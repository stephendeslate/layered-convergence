version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: escrow_marketplace
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/escrow_marketplace
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/escrow_marketplace
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 1h
      CORS_ORIGIN: http://localhost:3000
      API_PORT: '3001'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
