name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: escrow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d escrow_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/escrow_test?connection_limit=5
      DIRECT_URL: postgresql://test_user:test_password@localhost:5432/escrow_test
      JWT_SECRET: ci-test-secret-key-not-for-production
      CORS_ORIGIN: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Generate Prisma client
        run: pnpm --filter api db:generate

      - name: Lint
        run: pnpm turbo run lint

      - name: Type check
        run: pnpm turbo run typecheck

      - name: Run tests
        run: pnpm turbo run test:ci

      - name: Build
        run: pnpm turbo run build

      - name: Migration check
        run: pnpm --filter api prisma migrate diff --from-empty --to-schema-datamodel apps/api/prisma/schema.prisma
