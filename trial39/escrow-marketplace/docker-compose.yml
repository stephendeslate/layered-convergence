services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: escrow
      POSTGRES_PASSWORD: escrow_secret
      POSTGRES_DB: escrow_marketplace
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U escrow -d escrow_marketplace"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://escrow:escrow_secret@postgres:5432/escrow_marketplace?connection_limit=10
      DIRECT_URL: postgresql://escrow:escrow_secret@postgres:5432/escrow_marketplace
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
