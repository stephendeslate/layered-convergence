name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: escrow_test
          POSTGRES_PASSWORD: escrow_test
          POSTGRES_DB: escrow_marketplace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U escrow_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://escrow_test:escrow_test@localhost:5432/escrow_marketplace_test?connection_limit=10
      JWT_SECRET: ci-test-secret-do-not-use-in-production
      CORS_ORIGIN: http://localhost:3000
      APP_VERSION: 0.0.0-ci

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit
        run: pnpm audit --audit-level=high

      - name: Generate Prisma client
        run: pnpm --filter api db:generate

      - name: Lint
        run: pnpm turbo run lint

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Test
        run: pnpm turbo run test:ci

      - name: Build
        run: pnpm turbo run build

      - name: Migration check
        run: pnpm --filter api prisma migrate diff --from-empty --to-schema-datamodel apps/api/prisma/schema.prisma
