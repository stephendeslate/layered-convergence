version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: analytics_engine
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/analytics_engine?schema=public&connection_limit=5
      JWT_SECRET: development-secret-change-in-production
      CORS_ORIGIN: http://localhost:3000
      APP_VERSION: '0.1.0'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
